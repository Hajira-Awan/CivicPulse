services:
  - type: web
    name: civicpulse-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: civicpulse-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
